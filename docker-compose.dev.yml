version: '3.9'

# ═════════════════════════════════════════════════════
#  ASSETFLOW ECOSYSTEM — Dev Infrastructure Only
#  Run this for local development (venv)
# ═════════════════════════════════════════════════════

networks:
  assetflow-dev:
    driver: bridge

volumes:
  mongodb-dev-data:
  redis-dev-data:
  ollama-dev-data:

services:

  mongodb:
    image: mongo:7.0
    container_name: assetflow-mongodb-dev
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: assetflow
      MONGO_INITDB_ROOT_PASSWORD: assetflow123
    volumes:
      - mongodb-dev-data:/data/db
    ports:
      - "27017:27017"
    networks:
      - assetflow-dev

  redis:
    image: redis:7.2-alpine
    container_name: assetflow-redis-dev
    restart: unless-stopped
    command: redis-server --requirepass redis123 --appendonly yes
    volumes:
      - redis-dev-data:/data
    ports:
      - "6379:6379"
    networks:
      - assetflow-dev

  ollama:
    image: ollama/ollama:latest
    container_name: assetflow-ollama-dev
    restart: unless-stopped
    volumes:
      - ollama-dev-data:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - assetflow-dev

  # Mongo Express (optional DB GUI)
  mongo-express:
    image: mongo-express:latest
    container_name: assetflow-mongo-express
    restart: unless-stopped
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: assetflow
      ME_CONFIG_MONGODB_ADMINPASSWORD: assetflow123
      ME_CONFIG_MONGODB_URL: mongodb://assetflow:assetflow123@mongodb:27017/
      ME_CONFIG_BASICAUTH: false
    ports:
      - "8081:8081"
    networks:
      - assetflow-dev
    depends_on:
      - mongodb

  # Redis Commander (optional)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: assetflow-redis-commander
    restart: unless-stopped
    environment:
      - REDIS_HOSTS=local:redis:6379:0:redis123
    ports:
      - "8082:8081"
    networks:
      - assetflow-dev
    depends_on:
      - redis
