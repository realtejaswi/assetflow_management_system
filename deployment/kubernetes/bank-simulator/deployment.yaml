---
# ── Bank Simulator Backend ───────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bank-backend
  namespace: assetflow
  labels:
    app: bank-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bank-backend
  template:
    metadata:
      labels:
        app: bank-backend
    spec:
      containers:
        - name: bank-backend
          image: assetflow/bank-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8001
          envFrom:
            - configMapRef: { name: assetflow-config }
            - secretRef: { name: assetflow-secrets }
          resources:
            requests: { memory: "256Mi", cpu: "200m" }
            limits: { memory: "512Mi", cpu: "500m" }
          livenessProbe:
            httpGet: { path: /health, port: 8001 }
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /health, port: 8001 }
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: bank-backend
  namespace: assetflow
spec:
  selector:
    app: bank-backend
  ports:
    - port: 8001
      targetPort: 8001
      nodePort: 30001
  type: NodePort
---
# ── Bank Simulator Frontend ──────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bank-frontend
  namespace: assetflow
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bank-frontend
  template:
    metadata:
      labels:
        app: bank-frontend
    spec:
      containers:
        - name: bank-frontend
          image: assetflow/bank-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          resources:
            requests: { memory: "64Mi", cpu: "50m" }
            limits: { memory: "128Mi", cpu: "100m" }
---
apiVersion: v1
kind: Service
metadata:
  name: bank-frontend
  namespace: assetflow
spec:
  selector:
    app: bank-frontend
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30010
  type: NodePort
---
# ── HPA for Bank Backend ─────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: bank-backend-hpa
  namespace: assetflow
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: bank-backend
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
