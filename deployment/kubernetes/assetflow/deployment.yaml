---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: assetflow-backend
  namespace: assetflow
spec:
  replicas: 2
  selector:
    matchLabels:
      app: assetflow-backend
  template:
    metadata:
      labels:
        app: assetflow-backend
    spec:
      containers:
        - name: assetflow-backend
          image: assetflow/assetflow-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8002
          envFrom:
            - configMapRef: { name: assetflow-config }
            - secretRef: { name: assetflow-secrets }
          resources:
            requests: { memory: "256Mi", cpu: "200m" }
            limits: { memory: "512Mi", cpu: "500m" }
          livenessProbe:
            httpGet: { path: /health, port: 8002 }
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: assetflow-backend
  namespace: assetflow
spec:
  selector:
    app: assetflow-backend
  ports:
    - port: 8002
      targetPort: 8002
      nodePort: 30002
  type: NodePort
---
apiVersion: apps/v1
