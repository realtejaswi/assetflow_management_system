          ports:
            - containerPort: 80
          resources:
            requests: { memory: "64Mi", cpu: "50m" }
            limits: { memory: "128Mi", cpu: "100m" }
---
apiVersion: v1
kind: Service
metadata:
  name: assetflow-frontend
  namespace: assetflow
spec:
  selector:
    app: assetflow-frontend
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30020
  type: NodePort
